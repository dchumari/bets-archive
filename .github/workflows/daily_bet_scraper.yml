name: Daily Bet Scraper

on:
  schedule:
    # Runs at 2:00 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:
    description: 'Manually trigger the bet scraper'

jobs:
  scrape-bets:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
        
    - name: Run bet scraper
      run: python3 bet_scraper.py
      
    - name: Upload results as artifact
      uses: actions/upload-artifact@v4
      with:
        name: bet-results-${{ github.run_number }}
        path: |
          data/finished_bets.json
          data/finished_bets.csv
        retention-days: 30
        if-no-files-found: error
